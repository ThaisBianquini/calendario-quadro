<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calendário">
<title>Calendário Artístico</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:Georgia, serif;
    color:#f3eee6;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    transition:background-image 1s ease;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.05);
    z-index:0;
}

#mes{
    position:absolute;
    top:35px;
    left:35px;
    font-size:70px;
    font-style:italic;
    z-index:2;
    opacity:.2;
}

#ano{
    position:absolute;
    top:45px;
    right:35px;
    font-size:35px;
    z-index:2;
    opacity:.2;
}

#dias{
    position:absolute;
    top:125px;
    left:5%;
    width:90%;
    display:grid;
    grid-template-columns:repeat(7,1fr);
    z-index:2;
}

#dias div{
    text-align:center;
    font-size:20px;
    padding-bottom:8px;
    opacity:.2;
}
    
#calendar{
    position:absolute;
    top:165px;
    left:5%;
    width:90%;
    height:73%;
    display:grid;
    grid-template-columns:repeat(7,1fr);
    grid-template-rows:repeat(6,1fr);
    z-index:2;
}

.dia{
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.2);
    padding:8px;
    position:relative;
    overflow:hidden;
}

.numero{
    text-align:right;
    font-size:24px;
    opacity:.2;
}

.evento{
    margin-top:5px;
    padding:2px 7px;
    border-radius:20px;
    font-size:11px;
    color:white;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
}

.passado::after{
    content:"";
    position:absolute;
    width:170%;
    height:1px;
    background:rgba(255,255,255,.2);
    left:-35%;
    top:50%;
    transform:rotate(-52deg);
}

.hoje{
    border:2px solid rgba(255,255,255,.2);
    box-shadow:
        0 0 0 1px rgba(255,255,255,.25),
        inset 0 0 0 1px rgba(255,255,255,.2);
}

</style>
</head>
<body>

<div id="mes"></div>
<div id="ano"></div>

<div id="dias">
    <div>MON</div>
    <div>TUE</div>
    <div>WED</div>
    <div>THU</div>
    <div>FRI</div>
    <div>SAT</div>
    <div>SUN</div>
</div>

<div id="calendar"></div>

<script>

const API_KEY = "AIzaSyC6X35o2JxZXgt77QtTRG9s9y8mOUt-Xm0";
const CALENDAR_ID = "thaiisbianquini@gmail.com";

const imagens = [
"https://raw.githubusercontent.com/ThaisBianquini/calendario-quadro/main/1.jpg",
"https://raw.githubusercontent.com/ThaisBianquini/calendario-quadro/main/2.jpg",
"https://raw.githubusercontent.com/ThaisBianquini/calendario-quadro/main/3.jpg",
"https://raw.githubusercontent.com/ThaisBianquini/calendario-quadro/main/4.jpg",
"https://raw.githubusercontent.com/ThaisBianquini/calendario-quadro/main/5.jpg",
"https://raw.githubusercontent.com/ThaisBianquini/calendario-quadro/main/6.jpg",
"https://raw.githubusercontent.com/ThaisBianquini/calendario-quadro/main/7.jpg",
"https://raw.githubusercontent.com/ThaisBianquini/calendario-quadro/main/8.jpg",
"https://raw.githubusercontent.com/ThaisBianquini/calendario-quadro/main/9.jpg",
"https://raw.githubusercontent.com/ThaisBianquini/calendario-quadro/main/10.jpg",
"https://raw.githubusercontent.com/ThaisBianquini/calendario-quadro/main/11.jpg",
"https://raw.githubusercontent.com/ThaisBianquini/calendario-quadro/main/12.jpg",
"https://raw.githubusercontent.com/ThaisBianquini/calendario-quadro/main/13.jpg",
"https://raw.githubusercontent.com/ThaisBianquini/calendario-quadro/main/14.jpg",
"https://raw.githubusercontent.com/ThaisBianquini/calendario-quadro/main/15.jpg",
"https://raw.githubusercontent.com/ThaisBianquini/calendario-quadro/main/16.jpg",
"https://raw.githubusercontent.com/ThaisBianquini/calendario-quadro/main/17.jpg",
"https://raw.githubusercontent.com/ThaisBianquini/calendario-quadro/main/18.jpg",
];

const coresGoogle = {
  "1":"#a4bdfc",
  "2":"#7ae7bf",
  "3":"#dbadff",
  "4":"#ff887c",
  "5":"#fbd75b",
  "6":"#ffb878",
  "7":"#46d6db",
  "8":"#e1e1e1",
  "9":"#5484ed",
  "10":"#51b749",
  "11":"#dc2127"
};

function mudarFundo(){
    const hora = new Date().getHours();
    document.body.style.backgroundImage =
    `url(${imagens[hora % imagens.length]})`;
}

mudarFundo();
setInterval(mudarFundo,3600000);

const meses = [
"Janeiro","Fevereiro","Março","Abril",
"Maio","Junho","Julho","Agosto",
"Setembro","Outubro","Novembro","Dezembro"
];

const hoje = new Date();

document.getElementById("mes").innerText =
meses[hoje.getMonth()];

document.getElementById("ano").innerText =
hoje.getFullYear();

async function criarCalendario(){

    const calendario =
        document.getElementById("calendar");

    calendario.innerHTML = "";

    const ano = hoje.getFullYear();
    const mes = hoje.getMonth();
    const diaHoje = hoje.getDate();

    let primeiro =
        new Date(ano,mes,1).getDay();

    primeiro = primeiro === 0 ? 6 : primeiro - 1;

    const diasMes =
        new Date(ano,mes+1,0).getDate();

    const inicio =
        new Date(ano,mes,1).toISOString();

    const fim =
        new Date(ano,mes+1,1).toISOString();

    let eventos = [];

    try{

        const resposta = await fetch(
        `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${inicio}&timeMax=${fim}&singleEvents=true&orderBy=startTime`
        );

        const dados = await resposta.json();
        eventos = dados.items || [];

    }catch(e){
        console.log(e);
    }

    for(let i=0;i<primeiro;i++){
        calendario.innerHTML += "<div></div>";
    }

    for(let dia=1; dia<=diasMes; dia++){

        let htmlEventos = "";

        eventos.forEach(ev=>{

            const data =
                ev.start.date ||
                ev.start.dateTime;

            const d = new Date(data);

            if(
                d.getDate()===dia &&
                d.getMonth()===mes
            ){

                let cor;

                const titulo =
                    ev.summary.toLowerCase();

                if (titulo.includes("aluguel")) {
                    cor = "#dc2127";
                }
                else if (
                    titulo.includes("estrogênio") ||
                    titulo.includes("estrogenio")
                ) {
                    cor = "#f4c2c2";
                }
                else {

                    const cores = [
                        "#5484ed",
                        "#51b749",
                        "#fbd75b",
                        "#ff887c",
                        "#dbadff",
                        "#46d6db",
                        "#ffb878"
                    ];

                    let numero = 0;

                    for (
                        let i = 0;
                        i < titulo.length;
                        i++
                    ) {
                        numero +=
                            titulo.charCodeAt(i);
                    }

                                        cor =
                        cores[
                            numero %
                            cores.length
                        ];
                }

                htmlEventos += `
                <div
                    class="evento"
                    style="
                    background:${cor}10;
                    border:1px solid ${cor}55;
                    "
                >
                    • ${ev.summary}
                </div>
                `;
            }
        });
        
        let classe = "dia";

        if(
            dia < diaHoje &&
            mes === hoje.getMonth() &&
            ano === hoje.getFullYear()
        ){
            classe += " passado";
        }

        if(
            dia === diaHoje &&
            mes === hoje.getMonth() &&
            ano === hoje.getFullYear()
        ){
            classe += " hoje";
        }

        calendario.innerHTML += `
        <div class="${classe}">
            <div class="numero">${dia}</div>
            ${htmlEventos}
        </div>
        `;
    }
}

criarCalendario();

</script>

</body>
</html>
