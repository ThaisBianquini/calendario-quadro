<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário Artístico</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:Georgia, serif;
    background-size:cover;
    background-position:center;
    color:white;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.28);
}

#mes{
    position:absolute;
    top:30px;
    left:40px;
    font-size:65px;
    font-style:italic;
    z-index:2;
}

#ano{
    position:absolute;
    top:45px;
    right:40px;
    font-size:35px;
    z-index:2;
}

#diasSemana{
    position:absolute;
    top:130px;
    left:5%;
    width:90%;
    display:grid;
    grid-template-columns:repeat(7,1fr);
    text-align:center;
    z-index:2;
}

#diasSemana div{
    font-size:25px;
}

#calendar{
    position:absolute;
    top:180px;
    left:5%;
    width:90%;
    height:70%;
    display:grid;
    grid-template-columns:repeat(7,1fr);
    grid-template-rows:repeat(6,1fr);
    z-index:2;
}

.dia{
    border:1px solid rgba(255,255,255,.12);
    padding:10px;
    background:rgba(255,255,255,.03);
}

.numero{
    font-size:28px;
}

.evento{
    margin-top:6px;
    font-size:11px;
    background:rgba(255,255,255,.18);
    border-radius:10px;
    padding:3px 6px;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div id="mes"></div>
<div id="ano"></div>

<div id="diasSemana">
    <div>MON</div>
    <div>TUE</div>
    <div>WED</div>
    <div>THU</div>
    <div>FRI</div>
    <div>SAT</div>
    <div>SUN</div>
</div>

<div id="calendar"></div>

<script>

const imagens = [
"https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5",
"https://images.unsplash.com/photo-1577083552431-6e5fd75fcfb9",
"https://images.unsplash.com/photo-1578301978018-3005759f48f7",
"https://images.unsplash.com/photo-1579783901586-d88db74b4fe4"
];

function mudarFundo(){
    const hora = new Date().getHours();
    document.body.style.backgroundImage =
    `url(${imagens[hora % imagens.length]})`;
}

mudarFundo();
setInterval(mudarFundo,3600000);

const meses = [
"Janeiro",
"Fevereiro",
"Março",
"Abril",
"Maio",
"Junho",
"Julho",
"Agosto",
"Setembro",
"Outubro",
"Novembro",
"Dezembro"
];

const hoje = new Date();

document.getElementById("mes").innerText =
meses[hoje.getMonth()];

document.getElementById("ano").innerText =
hoje.getFullYear();

function criarCalendario(){

    const calendario =
    document.getElementById("calendar");

    calendario.innerHTML = "";

    const ano = hoje.getFullYear();
    const mes = hoje.getMonth();

    let primeiro =
    new Date(ano,mes,1).getDay();

    primeiro = primeiro === 0 ? 6 : primeiro - 1;

    const diasMes =
    new Date(ano,mes+1,0).getDate();

    for(let i=0;i<primeiro;i++){
        calendario.innerHTML += "<div></div>";
    }

    for(let dia=1;dia<=diasMes;dia++){

        calendario.innerHTML += `
        <div class="dia">
            <div class="numero">${dia}</div>
        </div>
        `;
    }
}

criarCalendario();

</script>

</body>
</html>
