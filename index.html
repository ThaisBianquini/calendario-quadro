<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calendário Artístico</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    width:100vw;
    height:100vh;
    overflow:hidden;
    font-family:Georgia, serif;
    background-size:cover;
    background-position:center;
    color:#f3eee6;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.35);
    z-index:0;
}

#mes{
    position:absolute;
    top:40px;
    left:40px;
    font-size:72px;
    font-style:italic;
    z-index:2;
}

#ano{
    position:absolute;
    top:50px;
    right:45px;
    font-size:40px;
    z-index:2;
}

#dias{
    position:absolute;
    top:160px;
    left:7%;
    width:86%;
    display:grid;
    grid-template-columns:repeat(7,1fr);
    text-align:center;
    z-index:2;
    letter-spacing:1px;
}

#dias div{
    font-size:24px;
    opacity:.9;
}

#calendar{
    position:absolute;
    top:205px;
    left:7%;
    width:86%;
    height:70%;
    display:grid;
    grid-template-columns:repeat(7,1fr);
    grid-template-rows:repeat(6,1fr);
    z-index:2;
}

.dia{
    border:1px solid rgba(255,255,255,.08);
    padding:10px;
    background:rgba(255,255,255,.02);
}

.numero{
    font-size:26px;
    text-align:right;
    opacity:.95;
}

.evento{
    margin-top:8px;
    font-size:12px;
    background:rgba(255,255,255,.18);
    border-radius:20px;
    padding:4px 8px;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
    backdrop-filter:blur(6px);
}
</style>
</head>

<body>

<div id="mes"></div>
<div id="ano"></div>

<div id="dias">
    <div>MON</div>
    <div>TUE</div>
    <div>WED</div>
    <div>THU</div>
    <div>FRI</div>
    <div>SAT</div>
    <div>SUN</div>
</div>

<div id="calendar"></div>

<script>

const imagens = [
"https://raw.githubusercontent.com/placeholder1.jpg",
"https://raw.githubusercontent.com/placeholder2.jpg",
"https://raw.githubusercontent.com/placeholder3.jpg"
];

function mudarFundo(){
    const hora = new Date().getHours();
    document.body.style.backgroundImage =
    `url(${imagens[hora % imagens.length]})`;
}

const meses = [
"Janeiro","Fevereiro","Março","Abril",
"Maio","Junho","Julho","Agosto",
"Setembro","Outubro","Novembro","Dezembro"
];

const hoje = new Date();

document.getElementById("mes").innerText =
meses[hoje.getMonth()];

document.getElementById("ano").innerText =
hoje.getFullYear();

function criarCalendario(){

    const calendario =
    document.getElementById("calendar");

    calendario.innerHTML = "";

    const ano = hoje.getFullYear();
    const mes = hoje.getMonth();

    let primeiro =
    new Date(ano,mes,1).getDay();

    primeiro = primeiro === 0 ? 6 : primeiro - 1;

    const diasMes =
    new Date(ano,mes+1,0).getDate();

    for(let i=0;i<primeiro;i++){
        calendario.innerHTML += "<div></div>";
    }

    for(let dia=1;dia<=diasMes;dia++){

        calendario.innerHTML += `
        <div class="dia">
            <div class="numero">${dia}</div>
        </div>
        `;
    }
}

criarCalendario();
mudarFundo();
setInterval(mudarFundo,3600000);

</script>

</body>
</html>
