<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calendário Artístico</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:Georgia, serif;
    color:#f4eee5;
    background-size:cover;
    background-position:center;
    transition:background-image 1s ease;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.35);
    z-index:0;
}

#mes{
    position:absolute;
    top:35px;
    left:45px;
    font-size:72px;
    font-style:italic;
    z-index:2;
}

#ano{
    position:absolute;
    top:50px;
    right:45px;
    font-size:40px;
    z-index:2;
}

#dias{
    position:absolute;
    top:145px;
    left:7%;
    width:86%;
    display:grid;
    grid-template-columns:repeat(7,1fr);
    text-align:center;
    z-index:2;
    letter-spacing:1px;
}

#dias div{
    font-size:23px;
    opacity:.9;
}

#calendar{
    position:absolute;
    top:190px;
    left:7%;
    width:86%;
    height:70%;
    display:grid;
    grid-template-columns:repeat(7,1fr);
    grid-template-rows:repeat(6,1fr);
    z-index:2;
}

.dia{
    border:1px solid rgba(255,255,255,.12);
    padding:8px;
    background:rgba(255,255,255,.03);
    backdrop-filter:blur(2px);
}

.numero{
    text-align:right;
    font-size:25px;
}

.evento{
    margin-top:6px;
    padding:3px 7px;
    border-radius:15px;
    background:rgba(255,255,255,.18);
    font-size:11px;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
}

</style>
</head>

<body>

<div id="mes"></div>
<div id="ano"></div>

<div id="dias">
    <div>MON</div>
    <div>TUE</div>
    <div>WED</div>
    <div>THU</div>
    <div>FRI</div>
    <div>SAT</div>
    <div>SUN</div>
</div>

<div id="calendar"></div>

<script>

const API_KEY = "AIzaSyC6X35o2JxZXgt77QtTRG9s9y8mOUt-Xm0";
const CALENDAR_ID = "thaiisbianquini@gmail.com";

const imagens = [
"https://raw.githubusercontent.com/ThaisBianquini/calendario-quadro/main/1.png",
"https://raw.githubusercontent.com/ThaisBianquini/calendario-quadro/main/2.png",
"https://raw.githubusercontent.com/ThaisBianquini/calendario-quadro/main/1.png"
];

function mudarFundo(){
    const hora = new Date().getHours();
    document.body.style.backgroundImage =
        `url(${imagens[hora % imagens.length]})`;
}

mudarFundo();
setInterval(mudarFundo,3600000);

const meses = [
"Janeiro","Fevereiro","Março","Abril",
"Maio","Junho","Julho","Agosto",
"Setembro","Outubro","Novembro","Dezembro"
];

const hoje = new Date();

document.getElementById("mes").innerText =
meses[hoje.getMonth()];

document.getElementById("ano").innerText =
hoje.getFullYear();

async function criarCalendario(){

    const calendario =
        document.getElementById("calendar");

    calendario.innerHTML = "";

    const ano = hoje.getFullYear();
    const mes = hoje.getMonth();

    let primeiro =
        new Date(ano,mes,1).getDay();

    primeiro = primeiro === 0 ? 6 : primeiro - 1;

    const diasMes =
        new Date(ano,mes+1,0).getDate();

    const inicio =
        new Date(ano,mes,1).toISOString();

    const fim =
        new Date(ano,mes+1,1).toISOString();

    let eventos = [];

    try{

        const resposta = await fetch(
            `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${inicio}&timeMax=${fim}&singleEvents=true&orderBy=startTime`
        );

        const dados = await resposta.json();

        eventos = dados.items || [];

    }catch(e){
        console.log(e);
    }

    for(let i=0;i<primeiro;i++){
        calendario.innerHTML += "<div></div>";
    }

    for(let dia=1; dia<=diasMes; dia++){

        let htmlEventos = "";

        eventos.forEach(ev => {

            const data =
                ev.start.date ||
                ev.start.dateTime;

            const d = new Date(data);

            if(d.getDate() === dia){

                htmlEventos += `
                <div class="evento">
                    ${ev.summary}
                </div>
                `;
            }
        });

        calendario.innerHTML += `
        <div class="dia">
            <div class="numero">${dia}</div>
            ${htmlEventos}
        </div>
        `;
    }
}

criarCalendario();

</script>

</body>
</html>
